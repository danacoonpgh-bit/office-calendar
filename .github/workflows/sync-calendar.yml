name: Sync calendar from Outlook

on:
  schedule:
    # Every 2 hours from 6 AM to 8 PM Eastern (10:00–24:00 UTC during EDT)
    - cron: "0 10,12,14,16,18,20,22,0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-calendar
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet requests icalendar recurring-ical-events

      - name: Sync events from Outlook feed
        env:
          ICS_URL: ${{ secrets.ICS_URL }}
        run: python scripts/sync_calendar.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet events.json; then
            echo "No changes to publish."
            exit 0
          fi
          git config user.name "calendar-sync-bot"
          git config user.email "actions@github.com"
          git add events.json
          git commit -m "Auto-sync calendar from Outlook"
          git push
